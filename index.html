<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<!-- ホーム画面に追加したときにフルスクリーンで起動するための設定 -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="らくがきランド">
<meta name="theme-color" content="#8FD8FF">
<!-- PWA: マニフェストとiOS用ホーム画面アイコン -->
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon-192.png">
<title>らくがきランド</title>
<style>
  :root{
    --paper:#FFFDF5;
    --ink:#3B3B3B;
    --btn:#FF7A59;
    --btn-dark:#E85C3A;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{width:100%;height:100%;overflow:hidden;touch-action:none;user-select:none;-webkit-user-select:none;
    font-family:"Hiragino Maru Gothic ProN","BIZ UDPGothic","Yu Gothic",sans-serif;}
  #world{position:fixed;inset:0;}
  #playCanvas{position:absolute;inset:0;width:100%;height:100%;display:block;}

  /* ---- おえかきちょう ---- */
  #pad{
    position:absolute;left:50%;bottom:max(12px, env(safe-area-inset-bottom));transform:translateX(-50%);
    z-index:12;
    background:var(--paper);border:4px solid var(--ink);border-radius:24px;
    box-shadow:0 8px 0 rgba(0,0,0,.18);
    padding:10px 12px 12px;display:flex;flex-direction:column;gap:8px;
    transition:transform .35s cubic-bezier(.34,1.56,.64,1),opacity .3s;
    max-width:96vw;
  }
  #pad.hidden{transform:translateX(-50%) translateY(130%);opacity:0;pointer-events:none;}
  #padTitle{font-weight:800;color:var(--ink);font-size:15px;letter-spacing:.15em;text-align:center;}
  #drawWrap{position:relative;background:#fff;border:3px dashed #cfc8b8;border-radius:14px;overflow:hidden;}
  #drawCanvas{display:block;touch-action:none;cursor:crosshair;}
  #hint{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    color:#c9c2b2;font-weight:800;font-size:20px;pointer-events:none;letter-spacing:.1em;}

  #tools{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:center;}
  .swatch{width:36px;height:36px;border-radius:50%;border:3px solid rgba(0,0,0,.15);flex:none;}
  .swatch.sel{border:3px solid var(--ink);transform:scale(1.18);box-shadow:0 0 0 3px #fff inset;}
  .tool{height:36px;min-width:44px;border-radius:12px;border:3px solid var(--ink);background:#fff;
    font-size:16px;font-weight:800;color:var(--ink);padding:0 8px;}
  .tool.sel{background:#FFE9A8;}
  .swatch,.tool,#birthBtn,.fab,.chip{cursor:pointer;transition:transform .08s;}
  .swatch:active,.tool:active,#birthBtn:active,.fab:active,.chip:active{transform:scale(.92);}

  #birthBtn{
    width:100%;padding:12px 0;border:none;border-radius:18px;
    background:var(--btn);box-shadow:0 5px 0 var(--btn-dark);
    color:#fff;font-size:22px;font-weight:900;letter-spacing:.2em;
  }
  #birthBtn:active{box-shadow:0 1px 0 var(--btn-dark);transform:translateY(4px);}

  /* ---- フローティングボタン ---- */
  .fab{
    width:60px;height:60px;border-radius:50%;
    border:4px solid var(--ink);box-shadow:0 5px 0 rgba(0,0,0,.2);
    font-size:27px;display:flex;align-items:center;justify-content:center;background:#fff;
  }
  #togglePad{position:absolute;left:max(14px, env(safe-area-inset-left));bottom:max(14px, env(safe-area-inset-bottom));background:#FFD93C;}
  #albumBtn{position:absolute;left:max(14px, env(safe-area-inset-left));top:max(14px, env(safe-area-inset-top));background:#B7E5FF;}
  #topRight{position:absolute;right:max(14px, env(safe-area-inset-right));top:max(14px, env(safe-area-inset-top));display:flex;gap:10px;align-items:center;}
  #nightBtn{background:#E8DDFF;}
  #magicBtn{position:absolute;right:max(14px, env(safe-area-inset-right));bottom:max(14px, env(safe-area-inset-bottom));background:#FFE1F0;}
  #magicBtn.armed{background:#FF9ECF;animation:pulse 1s infinite;}
  @keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.1);}}
  #magicBanner{
    position:absolute;top:max(88px, calc(env(safe-area-inset-top) + 74px));left:50%;transform:translateX(-50%);
    background:rgba(255,255,255,.92);border:3px solid var(--ink);border-radius:16px;
    padding:10px 18px;font-size:16px;font-weight:800;color:var(--ink);
    display:none;white-space:nowrap;max-width:92vw;
  }
  #magicBanner.show{display:block;}
  .chip{
    padding:8px 14px;border-radius:14px;border:3px solid var(--ink);
    background:rgba(255,255,255,.88);font-size:14px;font-weight:800;color:var(--ink);
    display:none;height:44px;
  }
  .chip.show{display:block;}

  /* ---- ずかん ---- */
  #album{
    position:fixed;inset:0;background:rgba(40,40,60,.45);
    display:none;align-items:center;justify-content:center;z-index:20;
  }
  #album.show{display:flex;}
  #albumPanel{
    background:var(--paper);border:4px solid var(--ink);border-radius:24px;
    box-shadow:0 10px 0 rgba(0,0,0,.25);
    width:min(560px,92vw);max-height:82vh;display:flex;flex-direction:column;
    padding:16px;gap:12px;
  }
  #albumTitle{font-size:19px;font-weight:900;color:var(--ink);text-align:center;letter-spacing:.2em;}
  #albumGrid{
    display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));
    gap:10px;overflow-y:auto;padding:4px;touch-action:pan-y;
  }
  .albumItem{position:relative;background:#fff;border:3px solid #ded6c2;border-radius:14px;
    aspect-ratio:1;display:flex;align-items:center;justify-content:center;padding:8px;}
  .albumItem img{max-width:100%;max-height:100%;pointer-events:none;}
  .albumItem .del{
    position:absolute;top:-8px;right:-8px;width:28px;height:28px;border-radius:50%;
    border:2px solid var(--ink);background:#fff;color:var(--ink);font-weight:900;font-size:13px;
  }
  #albumEmpty{color:#b7af9d;font-weight:800;text-align:center;padding:26px 0;}
  #albumClose{align-self:center;padding:10px 34px;border-radius:16px;border:none;
    background:var(--btn);box-shadow:0 4px 0 var(--btn-dark);color:#fff;font-size:17px;font-weight:900;}
</style>
</head>
<body>
<div id="world">
  <canvas id="playCanvas"></canvas>

  <button id="albumBtn" class="fab" title="ずかん">📖</button>
  <div id="topRight">
    <button id="byeBtn" class="chip">みんな バイバイ 👋</button>
    <button id="sceneBtn" class="fab" title="ばしょをかえる">🌼</button>
    <button id="nightBtn" class="fab" title="よる／ひる">🌙</button>
  </div>
  <button id="togglePad" class="fab">⬇️</button>
  <button id="magicBtn" class="fab" title="へんしん">🪄</button>
  <div id="magicBanner">🪄 へんしんさせたい キャラを タッチしてね!</div>

  <div id="pad">
    <div id="padTitle">✏️ おえかきちょう ✏️</div>
    <div id="drawWrap">
      <canvas id="drawCanvas"></canvas>
      <div id="hint">ここに かいてね!</div>
    </div>
    <div id="tools"></div>
    <button id="birthBtn">うまれる!!</button>
  </div>

  <div id="album">
    <div id="albumPanel">
      <div id="albumTitle">📖 らくがき ずかん 📖</div>
      <div id="albumGrid"></div>
      <button id="albumClose">とじる</button>
    </div>
  </div>
</div>

<script>
"use strict";
/* ================= 基本セットアップ ================= */
const playCv = document.getElementById("playCanvas");
const pctx = playCv.getContext("2d");
const drawCv = document.getElementById("drawCanvas");
const dctx = drawCv.getContext("2d");
const pad = document.getElementById("pad");
const hint = document.getElementById("hint");
const togglePad = document.getElementById("togglePad");
const byeBtn = document.getElementById("byeBtn");
const nightBtn = document.getElementById("nightBtn");
const DPR = Math.min(window.devicePixelRatio || 1, 2);

let W = 0, H = 0, groundY = 0;
let stars = [];
function resizeWorld(){
  W = window.innerWidth; H = window.innerHeight;
  playCv.width = W * DPR; playCv.height = H * DPR;
  pctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  groundY = H * 0.82;
  stars = [];
  const n = Math.floor(W / 14);
  for(let i=0;i<n;i++){
    stars.push({x:Math.random()*W, y:Math.random()*groundY*0.8,
      r:0.8+Math.random()*1.8, ph:Math.random()*Math.PI*2, sp:1+Math.random()*2});
  }
}
window.addEventListener("resize", resizeWorld);
resizeWorld();

/* おえかきキャンバス(論理サイズ固定) */
const DW = 440, DH = 300;
function sizeDrawCanvas(){
  /* 隅の丸ボタン(左右各~90px)と重ならない幅に制限する */
  const maxW = Math.min(window.innerWidth * 0.9 - 30, window.innerWidth - 190, 440);
  const cssW = Math.max(220, maxW);
  drawCv.style.width = cssW + "px";
  drawCv.style.height = cssW * (DH / DW) + "px";
}
drawCv.width = DW * DPR; drawCv.height = DH * DPR;
dctx.setTransform(DPR, 0, 0, DPR, 0, 0);
dctx.lineCap = "round"; dctx.lineJoin = "round";
sizeDrawCanvas();
window.addEventListener("resize", sizeDrawCanvas);
document.addEventListener("contextmenu", e=>e.preventDefault());

/* ================= サウンド(WebAudio生成) ================= */
let audio = null;
function ensureAudio(){
  if(!audio){ audio = new (window.AudioContext || window.webkitAudioContext)(); }
  if(audio.state === "suspended") audio.resume();
}
function tone(freq, t0, dur, type, vol){
  if(!audio) return;
  const o = audio.createOscillator(), g = audio.createGain();
  o.type = type; o.frequency.setValueAtTime(freq, audio.currentTime + t0);
  g.gain.setValueAtTime(vol, audio.currentTime + t0);
  g.gain.exponentialRampToValueAtTime(0.001, audio.currentTime + t0 + dur);
  o.connect(g); g.connect(audio.destination);
  o.start(audio.currentTime + t0); o.stop(audio.currentTime + t0 + dur + 0.05);
}
function sndBirth(){ ensureAudio(); [523,659,784,1047].forEach((f,i)=>tone(f, i*0.09, 0.25, "triangle", 0.25)); }
function sndBoing(){ ensureAudio();
  const o = audio.createOscillator(), g = audio.createGain();
  o.type = "sine";
  o.frequency.setValueAtTime(180, audio.currentTime);
  o.frequency.exponentialRampToValueAtTime(560, audio.currentTime + 0.18);
  g.gain.setValueAtTime(0.3, audio.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audio.currentTime + 0.3);
  o.connect(g); g.connect(audio.destination); o.start(); o.stop(audio.currentTime + 0.35);
}
function sndPop(){ ensureAudio(); tone(880, 0, 0.07, "square", 0.12); }
function sndThud(){ ensureAudio(); tone(110, 0, 0.14, "sine", 0.35); tone(70, 0, 0.2, "sine", 0.3); }
function sndChirp(base, delay=0){ ensureAudio();
  tone(base, delay, 0.1, "triangle", 0.2);
  tone(base*1.26, delay+0.11, 0.13, "triangle", 0.2);
}
function sndTwinkle(){ ensureAudio(); [1318,1568,2093].forEach((f,i)=>tone(f, i*0.12, 0.3, "sine", 0.12)); }
function sndHenshin(){ ensureAudio(); [392,523,659,880,1175,1568].forEach((f,i)=>tone(f, i*0.07, 0.22, "triangle", 0.24)); tone(200, 0, 0.3, "sine", 0.2); }

/* ================= AIへんしん設定 =================
 * GASプロキシのWebアプリURLを設定すると、🪄でClaude APIによる
 * 絵の判定(名前・種類・動き方・コメント)が有効になる。
 * 空文字のままなら、オフラインへんしん(目と手足が生える)のみ動作。 */
const GAS_ENDPOINT = "https://script.google.com/macros/s/AKfycbyuGfHlKdliylCuJJphdXjx8kR9nuuai3ZWHMYB_RE_wqvyOpAqKEQ18Yo7b9nAeo33/exec";

/* ================= おしゃべり(Web Speech API) ================= */
const DAY_LINES = ["こんにちは!","あそぼ〜!","ジャンプ だいすき!","きょうも いいてんき!","えへへ〜","なにして あそぶ?","だーいすき!","くすぐったいよ〜!"];
const NIGHT_LINES = ["わっ! びっくりした!","ねてたのに〜","むにゃむにゃ…","もうあさ…?"];
const HELLO_LINES = ["うまれたよ〜!","はじめまして!","やっほー!"];
const OFFLINE_NAMES = ["ぷにちゃん","もこもこ","ぴょんた","くるりん","ぽんぽこ","にこまる","ふわり","ちびすけ"];
let jaVoice = null;
function pickVoice(){
  if(!("speechSynthesis" in window)) return;
  const vs = speechSynthesis.getVoices();
  jaVoice = vs.find(v=>v.lang && v.lang.indexOf("ja")===0) || null;
}
if("speechSynthesis" in window){
  pickVoice();
  speechSynthesis.onvoiceschanged = pickVoice;
}
function speak(c, text){
  c.say = text;
  c.sayT = Math.max(1.8, text.length*0.15 + 1);
  try{
    if("speechSynthesis" in window && jaVoice !== undefined){
      const u = new SpeechSynthesisUtterance(text);
      u.lang = "ja-JP";
      if(jaVoice) u.voice = jaVoice;
      u.pitch = c.pitch;   // キャラごとに違う声の高さ
      u.rate = 1.05;
      speechSynthesis.cancel();
      speechSynthesis.speak(u);
    }else{
      sndChirp(c.voice);
    }
  }catch(err){ sndChirp(c.voice); }
}

/* ================= おえかきツール ================= */
const COLORS = ["#3B3B3B","#FF5A5A","#FFA53C","#FFD93C","#58C95E","#4D9DFF","#A46DEB","#FF8FC1","#9C6B4A"];
let curColor = COLORS[1];
let brush = 9;
let erasing = false;
const strokes = [];
const activeStrokes = new Map(); // pointerId -> stroke(マルチタッチ対応)

const tools = document.getElementById("tools");
COLORS.forEach(c=>{
  const b = document.createElement("button");
  b.className = "swatch"; b.style.background = c;
  b.onclick = ()=>{ sndPop(); erasing = false; curColor = c; refreshTools(); };
  b.dataset.color = c;
  tools.appendChild(b);
});
const sizeBtn = document.createElement("button");
sizeBtn.className = "tool"; sizeBtn.textContent = "ふつう";
sizeBtn.onclick = ()=>{ sndPop(); brush = brush >= 22 ? 5 : brush + 6;
  sizeBtn.textContent = brush<=8?"ほそい":brush<=16?"ふつう":"ふとい"; };
const eraseBtn = document.createElement("button");
eraseBtn.className = "tool"; eraseBtn.textContent = "🧽";
eraseBtn.onclick = ()=>{ sndPop(); erasing = !erasing; refreshTools(); };
const undoBtn = document.createElement("button");
undoBtn.className = "tool"; undoBtn.textContent = "↩︎";
undoBtn.onclick = ()=>{ sndPop(); strokes.pop(); redraw(); };
const clearBtn = document.createElement("button");
clearBtn.className = "tool"; clearBtn.textContent = "ぜんぶけす";
clearBtn.onclick = ()=>{ sndPop(); strokes.length = 0; redraw(); };
tools.append(sizeBtn, eraseBtn, undoBtn, clearBtn);

function refreshTools(){
  document.querySelectorAll(".swatch").forEach(s=>s.classList.toggle("sel", !erasing && s.dataset.color === curColor));
  eraseBtn.classList.toggle("sel", erasing);
}
refreshTools();

function drawPos(e){
  const r = drawCv.getBoundingClientRect();
  return { x:(e.clientX - r.left) * DW / r.width, y:(e.clientY - r.top) * DH / r.height };
}
function strokeSegment(s, a, b){
  dctx.globalCompositeOperation = s.erase ? "destination-out" : "source-over";
  dctx.strokeStyle = s.color; dctx.lineWidth = s.erase ? s.size * 2.5 : s.size;
  dctx.beginPath(); dctx.moveTo(a.x, a.y); dctx.lineTo(b.x, b.y); dctx.stroke();
}
function redraw(){
  dctx.save(); dctx.setTransform(1,0,0,1,0,0);
  dctx.clearRect(0,0,drawCv.width,drawCv.height); dctx.restore();
  for(const s of strokes){
    for(let i=1;i<s.pts.length;i++) strokeSegment(s, s.pts[i-1], s.pts[i]);
    if(s.pts.length===1) strokeSegment(s, s.pts[0], {x:s.pts[0].x+0.1, y:s.pts[0].y});
  }
  hint.style.display = strokes.length ? "none" : "flex";
}
drawCv.addEventListener("pointerdown", e=>{
  ensureAudio();
  e.preventDefault();
  drawCv.setPointerCapture(e.pointerId);
  const p = drawPos(e);
  const st = { color:curColor, size:brush, erase:erasing, pts:[p] };
  strokes.push(st);
  activeStrokes.set(e.pointerId, st);
  strokeSegment(st, p, {x:p.x+0.1, y:p.y});
  hint.style.display = "none";
});
drawCv.addEventListener("pointermove", e=>{
  const st = activeStrokes.get(e.pointerId);
  if(!st) return;
  e.preventDefault();
  const p = drawPos(e);
  strokeSegment(st, st.pts[st.pts.length-1], p);
  st.pts.push(p);
});
function endStroke(e){ activeStrokes.delete(e.pointerId); }
drawCv.addEventListener("pointerup", endStroke);
drawCv.addEventListener("pointercancel", endStroke);
window.addEventListener("pointerup", endStroke);

/* ================= ずかん(localStorage) ================= */
const ZUKAN_KEY = "rakugakiZukan_v1";
const ZUKAN_MAX = 24;
let storageOK = true;
function loadZukan(){
  try{ return JSON.parse(localStorage.getItem(ZUKAN_KEY) || "[]"); }
  catch(e){ storageOK = false; return []; }
}
function saveZukan(arr){
  try{ localStorage.setItem(ZUKAN_KEY, JSON.stringify(arr)); }
  catch(e){ storageOK = false; }
}
function addToZukan(dataURL, w, h){
  if(!storageOK) return;
  const arr = loadZukan();
  arr.push({ id: Date.now() + "_" + Math.floor(Math.random()*9999), src:dataURL, w, h, t:Date.now() });
  while(arr.length > ZUKAN_MAX) arr.shift();
  saveZukan(arr);
}

const album = document.getElementById("album");
const albumGrid = document.getElementById("albumGrid");
document.getElementById("albumBtn").addEventListener("click", ()=>{
  sndPop(); renderAlbum(); album.classList.add("show");
});
document.getElementById("albumClose").addEventListener("click", ()=>{
  sndPop(); album.classList.remove("show");
});
album.addEventListener("pointerdown", e=>{ if(e.target === album) album.classList.remove("show"); });

function renderAlbum(){
  albumGrid.innerHTML = "";
  const arr = loadZukan();
  if(!arr.length){
    const d = document.createElement("div");
    d.id = "albumEmpty";
    d.textContent = storageOK ? "まだ なにも いないよ。らくがきを うんでみよう!" : "この ブラウザでは ほぞん できないみたい…";
    d.style.gridColumn = "1 / -1";
    albumGrid.appendChild(d);
    return;
  }
  for(const item of [...arr].reverse()){
    const cell = document.createElement("div");
    cell.className = "albumItem";
    const img = document.createElement("img");
    img.src = item.src;
    const del = document.createElement("button");
    del.className = "del"; del.textContent = "✕";
    del.onclick = ev=>{
      ev.stopPropagation(); sndPop();
      saveZukan(loadZukan().filter(z=>z.id !== item.id));
      renderAlbum();
    };
    cell.onclick = ()=>{
      const el = new Image();
      el.onload = ()=>{ spawnChar(el, item.w, item.h); sndBirth(); };
      el.src = item.src;
      album.classList.remove("show");
    };
    cell.append(img, del);
    albumGrid.appendChild(cell);
  }
}

/* ================= キャラクター ================= */
const chars = [];
const MAX_CHARS = 8;

function spawnChar(imgSource, logicalW, logicalH){
  const maxDim = Math.max(90, Math.min(H*0.17, 150));
  const scale = Math.min(maxDim / logicalW, maxDim / logicalH, 1.4);
  const c = {
    img: imgSource,
    w: logicalW*scale, h: logicalH*scale,
    x: W*0.5 + (Math.random()*160-80),
    dir: Math.random()<0.5?-1:1,
    speed: 35 + Math.random()*55,
    hop: 14 + Math.random()*18,
    freq: 3 + Math.random()*2.5,
    t: Math.random()*10,
    voice: 320 + Math.random()*380,
    bornAt: performance.now(),
    jumpY: 0, jumpV: 0, jumping:false, spin:0,
    dragging:false, dragX:0, dragY:0,
    dropping:false, dropY:0, dropV:0,
    landT: 0,
    emoteT: 4 + Math.random()*6,
    greetCd: 2,
    /* --- v3: おしゃべり・へんしん --- */
    pitch: 0.8 + Math.random(),      // 声の高さ(キャラの個性)
    say: "", sayT: 0,                // 吹き出し
    name: null,
    move: "hop",                     // hop|run|fly|bounce|spin|zigzag
    limbs: false,                    // 目と手足が生えているか
    acc: "none",                     // アクセサリー
    trail: "none",                   // 移動時のキラキラ軌跡
    sizeMul: 1, w0: 0, h0: 0,        // へんしんによる大小変化
    spinPhase: 0,
    blinkT: 2 + Math.random()*3,
    altitude: 110 + Math.random()*90,
    flyP: 0,                         // 飛行の上昇度合い 0..1
    lastPy: groundY,
    aiBusy: false
  };
  c.w0 = c.w; c.h0 = c.h;
  chars.push(c);
  if(chars.length > MAX_CHARS){
    const old = chars.shift();
    burst(old.x, groundY - old.h/2);
  }
  burst(c.x, groundY - c.h*0.6);
  byeBtn.classList.add("show");
  return c;
}

function birth(){
  if(!strokes.length){ sndPop(); wobblePad(); return; }
  const img = dctx.getImageData(0, 0, drawCv.width, drawCv.height);
  let minX=1e9,minY=1e9,maxX=-1,maxY=-1;
  const d = img.data, w = drawCv.width;
  for(let y=0;y<drawCv.height;y+=2){
    for(let x=0;x<w;x+=2){
      if(d[(y*w+x)*4+3] > 20){
        if(x<minX)minX=x; if(x>maxX)maxX=x;
        if(y<minY)minY=y; if(y>maxY)maxY=y;
      }
    }

  const pw = Math.min(maxX-minX+8, drawCv.width), ph = Math.min(maxY-minY+8, drawCv.height);
  const off = document.createElement("canvas");
  off.width = pw; off.height = ph;
  off.getContext("2d").drawImage(drawCv, Math.max(0,minX-4), Math.max(0,minY-4), pw, ph, 0, 0, pw, ph);

  const born = spawnChar(off, pw/DPR, ph/DPR);
  addToZukan(off.toDataURL("image/png"), pw/DPR, ph/DPR);
  sndBirth();
  setTimeout(()=>speak(born, HELLO_LINES[Math.floor(Math.random()*HELLO_LINES.length)]), 700);

}

function drawStar(ctx, x, y, r, rot){

  for(let i=0;i<10;i++){
    const rr = i%2===0 ? r : r*0.45;
    const a = rot + i*Math.PI/5;
    ctx[i===0?"moveTo":"lineTo"](x+Math.cos(a)*rr, y+Math.sin(a)*rr);
  }
  ctx.closePath(); ctx.fill();
}

/* 昼の色を夜色へ寄せる補間(昼夜クロスフェード対応) */
function hex2rgb(h){ return [parseInt(h.slice(1,3),16), parseInt(h.slice(3,5),16), parseInt(h.slice(5,7),16)]; }
function shade(hex, extra=0){
  const t = Math.min(1, nightMix*0.55 + extra);
  const a = hex2rgb(hex), b = [26,36,80]; // #1A2450
  return `rgb(${Math.round(a[0]+(b[0]-a[0])*t)},${Math.round(a[1]+(b[1]-a[1])*t)},${Math.round(a[2]+(b[2]-a[2])*t)})`;
}

const clouds = [
  {x:0.15, y:0.16, s:1.0, v:8},

].map(c=>({x:c.x*window.innerWidth, y:c.y, s:c.s, v:c.v}));

/* ゆきシーン用の雪 */
const flakes = [];
function ensureFlakes(){
  while(flakes.length < 45){
    flakes.push({x:Math.random()*W, y:Math.random()*H, vy:22+Math.random()*36,
      ph:Math.random()*Math.PI*2, r:1.6+Math.random()*2.4});
  }
}

function groundPath(){
  pctx.beginPath();
  pctx.moveTo(0, groundY);
  pctx.quadraticCurveTo(W*0.25, groundY-46, W*0.5, groundY-8);
  pctx.quadraticCurveTo(W*0.75, groundY+22, W, groundY-30);
  pctx.lineTo(W, H); pctx.lineTo(0, H); pctx.closePath();
}

function mountain(x, w, h, col, snowCap){
  const top = groundY - h;
  pctx.fillStyle = col;
  pctx.beginPath();
  pctx.moveTo(x - w/2, groundY+8);
  pctx.lineTo(x, top);
  pctx.lineTo(x + w/2, groundY+8);
  pctx.closePath(); pctx.fill();
  if(snowCap){
    pctx.fillStyle = shade("#FFFFFF");
    pctx.beginPath();
    pctx.moveTo(x - w*0.13, top + h*0.24);
    pctx.lineTo(x, top);
    pctx.lineTo(x + w*0.13, top + h*0.24);
    pctx.lineTo(x + w*0.07, top + h*0.19);
    pctx.lineTo(x, top + h*0.27);
    pctx.lineTo(x - w*0.07, top + h*0.19);
    pctx.closePath(); pctx.fill();
  }
}

/* シーンごとの遠景(空と地面のあいだ) */
function drawBackdrop(scene, dt, now){
  if(scene.id === "yama"){
    mountain(W*0.22, W*0.62, H*0.42, shade("#8FB3D6"), true);
    mountain(W*0.78, W*0.7,  H*0.5,  shade("#7CA6CE"), true);
    mountain(W*0.5,  W*0.66, H*0.32, shade("#6E9A70"), false);
  }
  else if(scene.id === "umi"){
    const horizon = groundY - 86;
    const sea = pctx.createLinearGradient(0, horizon, 0, groundY+8);
    sea.addColorStop(0, shade("#2E9AD6"));
    sea.addColorStop(1, shade("#7FD3EC"));
    pctx.fillStyle = sea;
    pctx.fillRect(0, horizon, W, groundY - horizon + 8);
    /* うごく波 */
    pctx.strokeStyle = `rgba(255,255,255,${0.55 - nightMix*0.3})`;
    pctx.lineWidth = 2.5;
    for(let k=0;k<3;k++){
      const wy = horizon + 22 + k*24;
      pctx.beginPath();
      for(let x=0;x<=W;x+=14){
        const y = wy + Math.sin(x/46 + now/650 + k*1.8)*3.5;
        if(x===0) pctx.moveTo(x,y); else pctx.lineTo(x,y);
      }
      pctx.stroke();
    }
  }
  else if(scene.id === "yuki"){
    mountain(W*0.25, W*0.7, H*0.36, shade("#D7E5F1"), false);
    mountain(W*0.75, W*0.74, H*0.42, shade("#C7DAEC"), false);
  }
}

/* ゆきは手前に降らせる(地面より上のレイヤー) */
function drawSnowfall(dt, now){
  ensureFlakes();
  pctx.fillStyle = `rgba(255,255,255,${0.9 - nightMix*0.25})`;
  for(const f of flakes){
    f.y += f.vy*dt;
    f.x += Math.sin(now/900 + f.ph)*22*dt;
    if(f.y > H+4){ f.y = -6; f.x = Math.random()*W; }
    pctx.beginPath(); pctx.arc(f.x, f.y, f.r, 0, Math.PI*2); pctx.fill();
  }
}

function drawBG(dt, now){
  const scene = SCENES[sceneIdx];
  // 昼の空(シーンごとの色)
  const sky = pctx.createLinearGradient(0,0,0,groundY);
  sky.addColorStop(0, scene.sky[0]); sky.addColorStop(1, scene.sky[1]);
  pctx.fillStyle = sky; pctx.fillRect(0,0,W,groundY+4);
  // 夜の空を重ねる
  if(nightMix > 0.01){
    const nsky = pctx.createLinearGradient(0,0,0,groundY);
    nsky.addColorStop(0,"#152253"); nsky.addColorStop(1,"#3E4C8C");
    pctx.globalAlpha = nightMix;
    pctx.fillStyle = nsky; pctx.fillRect(0,0,W,groundY+4);
    // 星
    for(const s of stars){
      pctx.globalAlpha = nightMix * (0.4 + 0.6*Math.abs(Math.sin(now/700*s.sp + s.ph)));
      pctx.fillStyle = "#FFF8D6";
      pctx.beginPath(); pctx.arc(s.x, s.y, s.r, 0, Math.PI*2); pctx.fill();
    }
    pctx.globalAlpha = 1;
  }
  // 太陽と月
  if(nightMix < 1){
    pctx.globalAlpha = 1 - nightMix;
    pctx.fillStyle = "#FFE066";
    pctx.beginPath(); pctx.arc(W-80, 84, 38, 0, Math.PI*2); pctx.fill();
  }
  if(nightMix > 0){
    pctx.globalAlpha = nightMix;
    pctx.fillStyle = "#FFF3C4";
    pctx.beginPath(); pctx.arc(W-80, 84, 34, 0, Math.PI*2); pctx.fill();
    pctx.fillStyle = "rgba(200,190,150,.5)";
    pctx.beginPath(); pctx.arc(W-92, 76, 6, 0, Math.PI*2); pctx.fill();
    pctx.beginPath(); pctx.arc(W-70, 94, 4, 0, Math.PI*2); pctx.fill();
  }
  pctx.globalAlpha = 1;
  // 雲(夜はうっすら)
  pctx.fillStyle = `rgba(255,255,255,${0.92 - nightMix*0.6})`;
  for(const c of clouds){
    c.x += c.v*dt; if(c.x > W+120) c.x = -120;
    const y = c.y*H, s = c.s;
    pctx.beginPath();
    pctx.arc(c.x, y, 24*s, 0, Math.PI*2);
    pctx.arc(c.x+26*s, y-10*s, 20*s, 0, Math.PI*2);
    pctx.arc(c.x+52*s, y, 22*s, 0, Math.PI*2);
    pctx.fill();
  }
  // 遠景(やまなみ・うみ など)
  drawBackdrop(scene, dt, now);
  // 地面(夜色に補間するので上塗り不要)
  pctx.fillStyle = shade(scene.g1);
  groundPath(); pctx.fill();
  pctx.fillStyle = shade(scene.g2);
  pctx.fillRect(0, groundY+18, W, H-groundY);
  // ゆきは手前にも降らせる
  if(scene.id === "yuki") drawSnowfall(dt, now);
}

/* ================= へんしん描画(手足・目玉) ================= */
/* キャラのローカル座標系(足元が y=0、体は上方向)で描く */
function drawLimbs(c, night, legLen){
  const ink = "#3B3B3B";
  const lw = Math.max(4, Math.min(7, c.w*0.05));
  pctx.strokeStyle = ink; pctx.fillStyle = ink;
  pctx.lineWidth = lw; pctx.lineCap = "round";
  const walk = night ? 0 : Math.sin(c.t * c.freq * 3.2);

  /* あし(左右交互にパタパタ) */
  const legX = c.w*0.2;
  for(const s of [-1, 1]){
    const a = walk * 0.55 * s;
    const fx = s*legX + Math.sin(a)*legLen;
    const fy = -Math.max(0, legLen - Math.cos(a)*legLen) ;
    pctx.beginPath();
    pctx.moveTo(s*legX, -legLen+2);
    pctx.lineTo(fx, -2 + fy*0);
    pctx.stroke();
    pctx.beginPath();
    pctx.ellipse(fx, -2, lw*0.9, lw*0.6, 0, 0, Math.PI*2);
    pctx.fill();
  }
  /* うで(あしと逆位相でぶんぶん) */
  const armY = -legLen - c.h*0.5;
  const armLen = Math.max(11, c.w*0.2);
  for(const s of [-1, 1]){
    const a = -walk * 0.7 * s + (night ? 0.5 : 0);
    pctx.beginPath();
    pctx.moveTo(s*c.w*0.46, armY);
    pctx.lineTo(s*c.w*0.46 + Math.cos(a)*armLen*s, armY + Math.sin(Math.abs(a))*armLen*0.6 + 4);
    pctx.stroke();
  }
  /* めだま(まばたき付き、夜は閉じる) */
  const er = Math.max(6, Math.min(15, Math.min(c.w, c.h)*0.11));
  const ey = -legLen - c.h*0.72;
  const blink = c.blinkT < 0;
  for(const s of [-1, 1]){
    const ex = s*c.w*0.2;
    if(night || blink){
      pctx.lineWidth = 2.5;
      pctx.beginPath();
      pctx.arc(ex, ey, er*0.8, 0.15*Math.PI, 0.85*Math.PI);
      pctx.stroke();
      pctx.lineWidth = lw;
    }else{
      pctx.fillStyle = "#fff";
      pctx.beginPath(); pctx.arc(ex, ey, er, 0, Math.PI*2); pctx.fill();
      pctx.lineWidth = 2;
      pctx.beginPath(); pctx.arc(ex, ey, er, 0, Math.PI*2); pctx.stroke();
      pctx.lineWidth = lw;
      pctx.fillStyle = ink;
      pctx.beginPath();
      pctx.arc(ex + er*0.3, ey + Math.sin(c.t*2)*er*0.12, er*0.45, 0, Math.PI*2);
      pctx.fill();
    }
  }
}

/* ================= アクセサリー描画 ================= */
function drawAcc(c, legLen){
  const w = c.w, h = c.h, top = -h - legLen;
  const ink = "#3B3B3B";
  pctx.lineWidth = Math.max(2.5, w*0.03);
  pctx.strokeStyle = ink; pctx.lineCap = "round"; pctx.lineJoin = "round";
  if(c.acc === "crown"){
    pctx.fillStyle = "#FFD24C";
    pctx.beginPath();
    pctx.moveTo(-w*0.22, top);
    pctx.lineTo(-w*0.22, top - h*0.18);
    pctx.lineTo(-w*0.11, top - h*0.08);
    pctx.lineTo(0, top - h*0.22);
    pctx.lineTo(w*0.11, top - h*0.08);
    pctx.lineTo(w*0.22, top - h*0.18);
    pctx.lineTo(w*0.22, top);
    pctx.closePath(); pctx.fill(); pctx.stroke();
  }else if(c.acc === "ribbon"){
    pctx.fillStyle = "#FF6FA5";
    for(const sd of [-1,1]){
      pctx.beginPath();
      pctx.moveTo(-w*0.26, top + h*0.04);
      pctx.lineTo(-w*0.26 + sd*w*0.14, top - h*0.04);
      pctx.lineTo(-w*0.26 + sd*w*0.14, top + h*0.12);
      pctx.closePath(); pctx.fill(); pctx.stroke();
    }
    pctx.beginPath(); pctx.arc(-w*0.26, top + h*0.04, w*0.05, 0, Math.PI*2); pctx.fill();
  }else if(c.acc === "glasses"){
    pctx.fillStyle = "rgba(80,60,60,.75)";
    for(const sd of [-1,1]){
      pctx.beginPath(); pctx.arc(sd*w*0.17, top + h*0.3, w*0.13, 0, Math.PI*2); pctx.fill(); pctx.stroke();
    }
    pctx.beginPath();
    pctx.moveTo(-w*0.05, top + h*0.3); pctx.lineTo(w*0.05, top + h*0.3);
    pctx.stroke();
  }else if(c.acc === "mustache"){
    pctx.strokeStyle = "#6B4A32"; pctx.lineWidth = Math.max(4, w*0.05);
    for(const sd of [-1,1]){
      pctx.beginPath();
      pctx.moveTo(0, top + h*0.6);
      pctx.quadraticCurveTo(sd*w*0.14, top + h*0.6, sd*w*0.2, top + h*0.52);
      pctx.stroke();
    }
    pctx.strokeStyle = "#3B3B3B";
  }else if(c.acc === "wizard"){
    pctx.fillStyle = "#8A6FE8";
    pctx.beginPath();
    pctx.moveTo(-w*0.26, top + h*0.02);
    pctx.lineTo(0, top - h*0.35);
    pctx.lineTo(w*0.26, top + h*0.02);
    pctx.closePath(); pctx.fill(); pctx.stroke();
    pctx.fillStyle = "#FFE066";
    drawStar(pctx, w*0.02, top - h*0.14, w*0.055, 0.3);
  }else if(c.acc === "halo"){
    pctx.strokeStyle = "#FFD24C"; pctx.lineWidth = Math.max(4, w*0.05);
    pctx.beginPath();
    pctx.ellipse(0, top - h*0.14 + Math.sin(c.t*3)*2, w*0.22, w*0.07, 0, 0, Math.PI*2);
    pctx.stroke();
    pctx.strokeStyle = "#3B3B3B";
  }else if(c.acc === "horns"){
    pctx.fillStyle = "#FF6B6B";
    for(const sd of [-1,1]){
      pctx.beginPath();
      pctx.moveTo(sd*w*0.16, top + h*0.02);
      pctx.lineTo(sd*w*0.3, top - h*0.16);
      pctx.lineTo(sd*w*0.3, top + h*0.06);
      pctx.closePath(); pctx.fill(); pctx.stroke();
    }
  }
}
/* マント(体のうしろに描く) */
function drawCape(c, legLen){
  const w = c.w, h = c.h;
  const fl = Math.sin(c.t*6)*w*0.1;
  pctx.fillStyle = "#E8484D";
  pctx.beginPath();
  pctx.moveTo(-w*0.36, -h*0.78 - legLen);
  pctx.quadraticCurveTo(-w*0.85 - fl, -h*0.35, -w*0.7 - fl*1.4, -legLen*0.4);
  pctx.lineTo(-w*0.3, -legLen*0.5 - h*0.08);
  pctx.closePath(); pctx.fill();
  pctx.strokeStyle = "#3B3B3B"; pctx.lineWidth = Math.max(2.5, w*0.03);
  pctx.stroke();
}

/* 角丸四角形パス */
function rr(x, y, w, h, r){
  pctx.beginPath();
  pctx.moveTo(x+r, y);
  pctx.arcTo(x+w, y, x+w, y+h, r);
  pctx.arcTo(x+w, y+h, x, y+h, r);
  pctx.arcTo(x, y+h, x, y, r);
  pctx.arcTo(x, y, x+w, y, r);
  pctx.closePath();
}
function drawBubble(text, x, y){
  pctx.font = "800 15px sans-serif";
  pctx.textAlign = "center";
  const tw = pctx.measureText(text).width;
  const bw = tw + 26, bh = 32;
  const bx = Math.min(Math.max(x, bw/2 + 6), W - bw/2 - 6);
  rr(bx - bw/2, y - bh, bw, bh, 12);
  pctx.fillStyle = "rgba(255,255,255,.95)"; pctx.fill();
  pctx.strokeStyle = "#3B3B3B"; pctx.lineWidth = 2.5; pctx.stroke();
  pctx.beginPath();
  pctx.moveTo(x-6, y-2); pctx.lineTo(x+6, y-2); pctx.lineTo(x, y+8);
  pctx.closePath();
  pctx.fillStyle = "rgba(255,255,255,.95)"; pctx.fill();
  pctx.fillStyle = "#3B3B3B";
  pctx.fillText(text, bx, y - 11);
}
function drawNameTag(name, x, y){
  pctx.font = "800 12px sans-serif";
  pctx.textAlign = "center";
  const tw = pctx.measureText(name).width;
  rr(x - tw/2 - 8, y - 18, tw + 16, 20, 9);
  pctx.fillStyle = "rgba(255,255,255,.8)"; pctx.fill();
  pctx.strokeStyle = "rgba(59,59,59,.7)"; pctx.lineWidth = 1.5; pctx.stroke();
  pctx.fillStyle = "#3B3B3B";
  pctx.fillText(name, x, y - 4);
}

/* ================= メインループ ================= */
let last = performance.now();
function loop(now){
  const dt = Math.min((now-last)/1000, 0.05); last = now;
  nightMix += Math.sign(nightTarget - nightMix) * Math.min(dt*1.4, Math.abs(nightTarget - nightMix));
  drawBG(dt, now);
  const night = isNight();

  /* --- あいさつ判定(昼のみ) --- */
  if(!night){
    for(let i=0;i<chars.length;i++){
      for(let j=i+1;j<chars.length;j++){
        const a = chars[i], b = chars[j];
        if(a.dragging||b.dragging||a.dropping||b.dropping) continue;
        if(a.greetCd>0 || b.greetCd>0) continue;
        if(Math.abs(a.x-b.x) < (a.w+b.w)*0.3 && Math.abs(a.lastPy-b.lastPy) < 70){
          a.greetCd = b.greetCd = 5 + Math.random()*3;
          for(const c of [a,b]){
            if(!c.jumping){ c.jumping = true; c.jumpY = 0; c.jumpV = -240; }
          }
          emote(a.x, a.lastPy-a.h-12, Math.random()<0.5?"♥":"♪");
          emote(b.x, b.lastPy-b.h-12, Math.random()<0.5?"♥":"♪");
          sndChirp(a.voice);
          sndChirp(b.voice, 0.16);
          a.dir = Math.sign(b.x-a.x)||1; b.dir = -a.dir;
        }
      }
    }
  }

  for(const c of chars){
    c.t += dt;
    c.greetCd = Math.max(0, c.greetCd - dt);
    c.landT = Math.max(0, c.landT - dt);

    /* エモート(ひとりごと / いびき) */
    c.emoteT -= dt;
    if(c.emoteT <= 0 && !c.dragging && !c.dropping){
      if(night) emote(c.x + c.w*0.3, c.lastPy - c.h - 8, "Z", 20);
      else emote(c.x, c.lastPy - c.h - 12, ["♪","☆","!"][Math.floor(Math.random()*3)]);
      c.emoteT = night ? 2.2 + Math.random()*2 : 6 + Math.random()*8;
    }

    /* --- 位置と姿勢 --- */
    const age = (now - c.bornAt)/1000;
    let bornOffset = 0;
    if(age < 0.6){ const k = 1-age/0.6; bornOffset = -k*k*140; }

    let px, py, sx = 1, sq = 1, rot = 0;

    if(c.dragging){
      px = c.dragX; py = c.dragY;
      rot = Math.sin(c.t*9)*0.14;
    }else if(c.dropping){
      c.dropV += 1500*dt;
      c.dropY += c.dropV*dt;
      if(c.dropY >= groundY){
        c.dropping = false; c.landT = 0.22;
        dust(c.x, groundY); sndThud();
      }
      px = c.x; py = Math.min(c.dropY, groundY);
    }else if(night){
      // すやすや(呼吸だけ)
      sq = 1 + Math.sin(c.t*1.6)*0.035;
      sx = 2 - sq;
      px = c.x; py = groundY;
      if(c.jumping){ // 起こされたとき
        c.jumpV += 900*dt; c.jumpY += c.jumpV*dt;
        if(c.jumpY >= 0){ c.jumping=false; c.jumpY=0; }
        py += c.jumpY;
      }
    }else{
      let spd = c.speed;
      if(c.move === "run") spd *= 1.9;
      if(c.move === "zigzag") spd *= 1.7;
      if(c.move === "spin") spd *= 0.8;
      c.x += spd * c.dir * dt;
      if(c.x < c.w/2){ c.x = c.w/2; c.dir = 1; }
      if(c.x > W - c.w/2){ c.x = W - c.w/2; c.dir = -1; }
      const flipP = c.move === "zigzag" ? 1.6 : 0.15;
      if(Math.random() < flipP*dt) c.dir *= -1;

      let jumpOffset = 0;
      if(c.jumping){
        c.jumpV += 900*dt;
        c.jumpY += c.jumpV*dt;
        c.spin += dt*9*c.dir*(c.jumpV<-300?1:0);
        if(c.jumpY >= 0){ c.jumping=false; c.jumpY=0; c.spin=0; if(c.jumpV>500) burst(c.x, groundY-10); }
        jumpOffset = c.jumpY;
      }
      /* 動きタイプごとの跳ねかた */
      let hopH, hopFreq, sqAmt;
      if(c.move === "fly"){ hopH = 0; hopFreq = c.freq; sqAmt = 0.03; }
      else if(c.move === "bounce"){ hopH = 52; hopFreq = c.freq*0.55; sqAmt = 0.24; }
      else { hopH = c.limbs ? 4 : c.hop; hopFreq = c.limbs ? c.freq*1.8 : c.freq; sqAmt = 0.12; }
      const hopPhase = Math.abs(Math.sin(c.t * hopFreq));
      sq = 1 - (1-hopPhase)*sqAmt;
      sx = 2 - sq;
      if(c.move === "spin"){
        c.spinPhase += dt*7*c.dir;
        rot = c.spinPhase;
      }else{
        rot = c.spin + Math.sin(c.t*hopFreq)*0.06*c.dir;
      }
      px = c.x;
      py = groundY + bornOffset + jumpOffset - hopPhase*hopH;
    }

    /* 移動のキラキラ軌跡 */
    if(c.trail !== "none" && !night && !c.dragging && !c.dropping && Math.random() < 30*dt){
      if(c.trail === "rainbow"){
        parts.push({x:px+(Math.random()*20-10), y:py-6, vx:(Math.random()*30-15)-c.dir*30, vy:-20-Math.random()*30,
          life:0.6, max:0.6, col:`hsl(${Math.floor((c.t*240)%360)},95%,62%)`, r:4+Math.random()*3, star:false});
      }else if(c.trail === "sparkle"){
        emotes.push({x:px+(Math.random()*30-15), y:py - Math.random()*c.h, vy:-24, life:0.55, max:0.55, txt:"✦", size:11+Math.random()*8});
      }else if(c.trail === "bubbles"){
        parts.push({x:px+(Math.random()*24-12), y:py - Math.random()*c.h*0.6, vx:Math.random()*14-7, vy:-40-Math.random()*30,
          life:0.9, max:0.9, col:"rgba(170,225,255,.85)", r:3+Math.random()*4, star:false, noG:true});
      }
    }

    /* --- 飛行(ふわふわ浮上、夜は降りてきて眠る) --- */
    const flyTarget = (c.move === "fly" && !night && !c.dragging && !c.dropping) ? 1 : 0;
    c.flyP += (flyTarget - c.flyP) * Math.min(1, dt*1.2);
    if(c.flyP > 0.01 && !c.dragging && !c.dropping){
      py -= c.altitude*c.flyP + Math.sin(c.t*2.2)*10*c.flyP;
      rot += Math.sin(c.t*2.2)*0.05*c.flyP;
    }

    /* まばたきタイマー */
    c.blinkT -= dt;
    if(c.blinkT < -0.13) c.blinkT = 2 + Math.random()*3.5;

    /* 着地のつぶれ */
    if(c.landT > 0){
      const k = c.landT/0.22;
      sq = 1 - 0.3*k; sx = 1 + 0.3*k;
    }

    /* 影 */
    const lift = groundY - py;
    pctx.fillStyle = `rgba(0,0,0,${Math.max(0.05, 0.16 - lift/1400)})`;
    pctx.beginPath();
    pctx.ellipse(px, groundY+6, Math.max(10, c.w*0.38*(1 - lift/420)), 7, 0, 0, Math.PI*2);
    pctx.fill();

    pctx.save();
    pctx.translate(px, py);
    pctx.rotate(rot);
    pctx.scale((c.dragging ? 1 : c.dir) * sx, sq);
    const legLen = c.limbs ? Math.max(13, c.h*0.2) : 0;
    if(c.acc === "cape") drawCape(c, legLen);
    pctx.drawImage(c.img, -c.w/2, -c.h - legLen, c.w, c.h);
    if(c.limbs) drawLimbs(c, night, legLen);
    if(c.acc !== "none" && c.acc !== "cape") drawAcc(c, legLen);
    pctx.restore();
    c.lastPy = py;

    /* 吹き出し・名前タグ(画面座標で描く) */
    const topY = py - c.h - legLen - 10;
    if(c.sayT > 0){
      c.sayT -= dt;
      drawBubble(c.say, px, Math.max(34, topY - 12));
    }else if(c.name){
      drawNameTag(c.name, px, Math.max(20, topY));
    }
  }

  /* パーティクル */
  for(let i=parts.length-1;i>=0;i--){
    const p = parts[i];
    p.life -= dt; if(p.life<=0){ parts.splice(i,1); continue; }
    if(p.puff){
      p.x += p.vx*dt; p.y += p.vy*dt;
      p.r += 26*dt;
      pctx.globalAlpha = (p.life/p.max)*0.85;
      pctx.fillStyle = p.col;
      pctx.beginPath(); pctx.arc(p.x, p.y, p.r, 0, Math.PI*2); pctx.fill();
      pctx.globalAlpha = 1;
      continue;
    }
    if(!p.noG) p.vy += 300*dt;
    p.x += p.vx*dt; p.y += p.vy*dt;
    pctx.globalAlpha = p.life/p.max;
    pctx.fillStyle = p.col;
    if(p.star) drawStar(pctx, p.x, p.y, p.r, p.life*6);
    else { pctx.beginPath(); pctx.arc(p.x,p.y,p.r*0.7,0,Math.PI*2); pctx.fill(); }
    pctx.globalAlpha = 1;
  }
  /* エモート */
  pctx.textAlign = "center";
  for(let i=emotes.length-1;i>=0;i--){
    const e = emotes[i];
    e.life -= dt; if(e.life<=0){ emotes.splice(i,1); continue; }
    e.y += e.vy*dt;
    pctx.globalAlpha = Math.min(1, e.life/e.max*1.6);
    pctx.fillStyle = EMOTE_COLOR[e.txt] || "#fff";
    pctx.font = `900 ${e.size}px sans-serif`;
    pctx.fillText(e.txt, e.x, e.y);
    pctx.globalAlpha = 1;
  }
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

/* ================= タップ&ドラッグ ================= */
let pending = null;
playCv.addEventListener("pointerdown", e=>{
  ensureAudio();
  const x = e.clientX, y = e.clientY;
  for(let i=chars.length-1;i>=0;i--){
    const c = chars[i];
    const foot = c.lastPy;
    if(Math.abs(x-c.x) < c.w*0.65 && y > foot - c.h*1.5 && y < foot + 18){
      if(magicMode){ setMagicMode(false); transformChar(c); return; }
      pending = { c, sx:x, sy:y, moved:false, id:e.pointerId };
      playCv.setPointerCapture(e.pointerId);
      // 最前面へ
      chars.splice(i,1); chars.push(c);
      return;
    }
  }
  if(magicMode) setMagicMode(false); // なにもない場所ならキャンセル
});
playCv.addEventListener("pointermove", e=>{
  if(!pending || e.pointerId !== pending.id) return;
  const c = pending.c;
  if(!pending.moved && Math.hypot(e.clientX-pending.sx, e.clientY-pending.sy) > 12){
    pending.moved = true;
    c.dragging = true; c.dropping = false; c.jumping = false;
    sndPop();
  }
  if(c.dragging){
    c.dragX = Math.min(Math.max(e.clientX, c.w/2), W - c.w/2);
    c.dragY = Math.min(e.clientY + 10, groundY);
    c.x = c.dragX;
  }
});
function releasePending(){
  if(!pending) return;
  const c = pending.c;
  if(pending.moved){
    c.dragging = false;
    c.dropping = true;
    c.dropY = c.dragY; c.dropV = 0;
  }else{
    if(isNight()){
      // 寝ているところを起こしてしまった
      emote(c.x, c.lastPy - c.h - 14, "!");
      if(!c.jumping){ c.jumping = true; c.jumpY = 0; c.jumpV = -260; }
      speak(c, NIGHT_LINES[Math.floor(Math.random()*NIGHT_LINES.length)]);
    }else{
      if(!c.jumping){
        c.jumping = true; c.jumpY = 0; c.jumpV = -430;
        if(Math.random() < 0.6) speak(c, DAY_LINES[Math.floor(Math.random()*DAY_LINES.length)]);
      }else{
        /* れんだで どんどん たかく! */
        c.jumpV = Math.max(c.jumpV - 330, -1250);
        emotes.push({x:c.x, y:c.lastPy - c.h - 16, vy:-40, life:0.6, max:0.6, txt:"✦", size:18});
      }
      sndBoing();
    }
  }
  pending = null;
}
playCv.addEventListener("pointerup", releasePending);
playCv.addEventListener("pointercancel", releasePending);

/* ================= へんしんモード(🪄) ================= */
let magicMode = false;
const magicBtn = document.getElementById("magicBtn");
const magicBanner = document.getElementById("magicBanner");
function setMagicMode(on){
  magicMode = on;
  magicBtn.classList.toggle("armed", on);
  magicBanner.classList.toggle("show", on);
}
magicBtn.addEventListener("click", ()=>{
  ensureAudio(); sndPop();
  if(!chars.length){
    setMagicMode(false);
    wobblePad();
    return;
  }
  setMagicMode(!magicMode);
});

/* キャラ画像をbase64(PNG)へ変換 */
function charToBase64(c){
  const tmp = document.createElement("canvas");
  const nw = c.img.naturalWidth || c.img.width;
  const nh = c.img.naturalHeight || c.img.height;
  tmp.width = nw; tmp.height = nh;
  tmp.getContext("2d").drawImage(c.img, 0, 0);
  return tmp.toDataURL("image/png").split(",")[1];
}

/* ================= へんしん適用(共通) ================= */
const MOVES = ["hop","run","fly","bounce","spin","zigzag"];
const ACCS = ["crown","ribbon","glasses","mustache","wizard","halo","horns","cape"];
const TRAILS = ["rainbow","sparkle","bubbles"];
const MOVE_LINE = { hop:"ぴょんぴょん!", run:"はしるの だいすき!", fly:"そらを とべるよ!",
  bounce:"おおジャンプ!", spin:"ぐるぐる〜!", zigzag:"ジグザグ ダッシュ!" };

function applyTransform(c, opt){
  /* ドロン!の煙と音 */
  puff(c.x, c.lastPy - c.h/2);
  burst(c.x, c.lastPy - c.h/2);
  sndHenshin();

  c.limbs = true;
  if(opt.name) c.name = String(opt.name).slice(0, 8);
  c.move = MOVES.includes(opt.move) ? opt.move : "hop";
  /* おおきさ */
  const mul = opt.size === "big" ? 1.7 : (opt.size === "small" ? 0.58 : 1);
  c.sizeMul = mul;
  c.w = c.w0 * mul; c.h = c.h0 * mul;
  /* アクセサリーと軌跡 */
  c.acc = (opt.acc && (ACCS.includes(opt.acc) || opt.acc === "none")) ? opt.acc : "none";
  c.trail = (opt.trail && (TRAILS.includes(opt.trail) || opt.trail === "none")) ? opt.trail : "none";
  /* こえの高さ */
  c.pitch = opt.voice === "low" ? 0.55 : (opt.voice === "high" ? 1.9 : 1.1);
  c.spinPhase = 0;
  c.flyP = 0;
  if(c.move === "fly") c.altitude = 110 + Math.random()*90;

  const line = opt.comment || ("へんしん! " + (c.name || "") + "だよ! " + (MOVE_LINE[c.move] || ""));
  setTimeout(()=>speak(c, line), 350);
}

function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

/* オフラインへんしん: 毎回ちがう組み合わせをランダム生成 */
function offlineTransform(c){
  const opt = {
    name: c.name || pick(OFFLINE_NAMES),
    move: pick(MOVES),
    size: Math.random() < 0.22 ? "big" : (Math.random() < 0.28 ? "small" : "normal"),
    acc: Math.random() < 0.78 ? pick(ACCS) : "none",
    trail: Math.random() < 0.62 ? pick(TRAILS) : "none",
    voice: pick(["low","mid","high"])
  };
  applyTransform(c, opt);
}

/* AIへんしん: GASプロキシ経由でClaudeに絵を判定してもらう */
async function aiTransform(c){
  c.aiBusy = true;
  c.say = "✨ かんがえちゅう…"; c.sayT = 15;
  burst(c.x, c.lastPy - c.h/2);
  try{
    const ctrl = new AbortController();
    const timer = setTimeout(()=>ctrl.abort(), 20000);
    const res = await fetch(GAS_ENDPOINT, {
      method: "POST",
      headers: { "Content-Type": "text/plain;charset=utf-8" }, // preflight回避のためtext/plain
      body: JSON.stringify({ image: charToBase64(c) }),
      signal: ctrl.signal
    });
    clearTimeout(timer);
    const data = await res.json();
    if(data.error) throw new Error(data.error);
    c.sayT = 0;
    applyTransform(c, data);
  }catch(err){
    console.log("AI transform failed:", err);
    c.sayT = 0;
    offlineTransform(c); // 失敗してもオフラインへんしんで楽しさは保証
  }finally{
    c.aiBusy = false;
  }
}

function transformChar(c){
  if(c.aiBusy) return;
  if(GAS_ENDPOINT) aiTransform(c);
  else offlineTransform(c);
}

    navigator.serviceWorker.register("./sw.js")
      .then(reg => console.log("SW registered:", reg.scope))
      .catch(err => console.log("SW registration failed:", err));
  });
}
